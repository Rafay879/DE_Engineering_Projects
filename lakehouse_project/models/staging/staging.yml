version: 2

models:
  - name: stg_orders
    description: "Cleaned orders from Silver layer"
    columns:
      - name: order_id
        data_tests:
          - not_null
          - unique
      - name: customer_id
        data_tests:
          - not_null
      - name: order_status
        data_tests:
          - not_null
          - accepted_values:
              values:
                - delivered
                - shipped
                - canceled
                - unavailable
                - invoiced
                - processing
                - created
                - approved

  - name: stg_customers
    columns:
      - name: customer_id
        data_tests:
          - not_null
          - unique
      - name: customer_unique_id
        data_tests:
          - not_null
      - name: customer_city
        data_tests:
          - not_null
      - name: customer_state
        data_tests:
          - not_null

  - name: stg_products
    columns:
      - name: product_id
        data_tests:
          - not_null
          - unique
      - name: product_weight_g
        data_tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      - name: product_length_cm
        data_tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      - name: product_height_cm
        data_tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      - name: product_width_cm
        data_tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"

  - name: stg_order_items
    columns:
      - name: order_id
        data_tests:
          - not_null
      - name: product_id
        data_tests:
          - not_null
      - name: price
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
      - name: freight_value
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"

  - name: stg_order_payments
    columns:
      - name: order_id
        data_tests:
          - not_null
      - name: payment_type
        data_tests:
          - not_null
          - accepted_values:
              values:
                - credit_card
                - boleto
                - voucher
                - debit_card
                - not_defined
              config:
                severity: warn
      - name: payment_value
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"